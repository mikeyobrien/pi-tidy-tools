name: Publish package to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify Trusted Publishing toolchain
        run: |
          node -e 'const [major, minor, patch] = process.argv[1].split(".").map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) { console.error(`npm 11.5.1 or newer is required, got ${process.argv[1]}`); process.exit(1); }' "$(npm --version)"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Resolve package
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          if [[ ! "$tag" =~ ^(pi-tidy-[a-z0-9-]+)-v([0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?)$ ]]; then
            echo "Release tag must match pi-tidy-<name>-v<version>: $tag" >&2
            exit 1
          fi
          slug="${BASH_REMATCH[1]}"
          expected_version="${BASH_REMATCH[2]}"

          case "$slug" in
            pi-tidy-tools|pi-tidy-subagents|pi-tidy-memory|pi-tidy-footer) ;;
            *)
              echo "Package is not on the publish allowlist: $slug" >&2
              exit 1
              ;;
          esac

          manifest="packages/$slug/package.json"
          if [[ ! -f "$manifest" ]]; then
            echo "Unknown package workspace: $slug" >&2
            exit 1
          fi

          package_name="$(node -p "require('./$manifest').name")"
          package_version="$(node -p "require('./$manifest').version")"
          if [[ "$package_name" != "@mobrienv/$slug" ]]; then
            echo "Manifest name must be @mobrienv/$slug, got $package_name" >&2
            exit 1
          fi
          if [[ "$package_version" != "$expected_version" ]]; then
            echo "Requested version $expected_version does not match $package_name@$package_version" >&2
            exit 1
          fi

          {
            echo "PACKAGE_NAME=$package_name"
            echo "PACKAGE_VERSION=$package_version"
          } >> "$GITHUB_ENV"

      - name: Validate workspaces
        run: |
          npm test
          npm run check
          npm pack --workspace "$PACKAGE_NAME" --dry-run

      - name: Publish with provenance
        run: npm publish --workspace "$PACKAGE_NAME" --access public --provenance
