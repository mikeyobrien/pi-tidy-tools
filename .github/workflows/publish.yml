name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm test
          npm run check

      - name: Verify release tag
        if: github.event_name == 'release'
        run: |
          node -e "const p=require('./package.json'); if (process.env.GITHUB_REF_NAME !== 'v'+p.version) { console.error('Release tag must be v'+p.version); process.exit(1) }"

      - name: Publish with provenance
        run: npm publish --access public --provenance
        # Bootstrap only: set NPM_TOKEN as an Actions secret for the first publish.
        # After configuring npm Trusted Publisher, delete the secret and this env block.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
